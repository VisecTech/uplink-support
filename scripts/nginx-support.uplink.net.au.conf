# support.uplink.net.au — standalone uplink-support app (:3081).
# Routes at root natively, so NO /support/ rewrite and no carve-outs are needed
# (unlike the parked Counter-module vhost). Plain reverse proxy.

server {
    listen 80;
    listen [::]:80;
    server_name support.uplink.net.au;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://support.uplink.net.au$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name support.uplink.net.au;

    ssl_certificate     /etc/letsencrypt/live/support.uplink.net.au/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/support.uplink.net.au/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Stage 1 attachments up to 25MB + multipart overhead.
    client_max_body_size 60m;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location / {
        proxy_pass http://127.0.0.1:3081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
